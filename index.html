<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>&#32025;&#29255;&#29557;&#39764;&#65281;</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at top, rgba(164, 58, 34, 0.45) 0%, rgba(12, 5, 8, 0.92) 56%, #040205 100%),
                url('background/background.png') center center / cover no-repeat;
            color: #fff6d6;
            font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", "Heiti TC", sans-serif;
        }

        .shell {
            width: min(1120px, 100%);
            padding: 28px;
            border: 1px solid rgba(255, 215, 120, 0.22);
            border-radius: 28px;
            background: rgba(13, 8, 11, 0.74);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
        }

        .hero {
            text-align: center;
            margin-bottom: 24px;
        }

        .hero h1 {
            margin: 0 0 10px;
            color: #ffd54d;
            font-size: clamp(2.2rem, 5vw, 4.2rem);
            letter-spacing: 0.08em;
        }

        .hero p {
            margin: 0;
            color: #efe1b0;
            font-size: 1.05rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 22px;
        }

        .card {
            position: relative;
            min-height: 420px;
            padding: 22px 22px 18px;
            border-radius: 22px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: linear-gradient(180deg, rgba(42, 26, 22, 0.84) 0%, rgba(10, 7, 12, 0.9) 100%);
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 215, 77, 0.45);
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.32);
        }

        .card.selected {
            border-color: #ffd54d;
            box-shadow: 0 0 0 1px rgba(255, 213, 77, 0.45), 0 0 30px rgba(255, 213, 77, 0.18);
        }

        .portrait {
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }

        .portrait img {
            max-width: 78%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 18px 20px rgba(0, 0, 0, 0.55));
        }

        .name {
            margin: 0 0 6px;
            font-size: 2rem;
            color: #fff;
        }

        .card.selected .name {
            color: #ffd54d;
        }

        .tag {
            display: inline-block;
            margin-bottom: 12px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: #f3e5b2;
            font-size: 0.92rem;
        }

        .desc {
            margin: 0;
            color: #d9cba5;
            line-height: 1.65;
        }

        .actions {
            display: flex;
            justify-content: center;
            margin-top: 24px;
        }

        #launch-btn {
            min-width: 280px;
            padding: 15px 28px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(180deg, #ffd95f 0%, #f2b80e 100%);
            color: #2a1705;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 14px 30px rgba(242, 184, 14, 0.3);
        }

        #launch-btn:hover {
            filter: brightness(1.04);
        }

        .about-panel {
            margin-top: 26px;
            padding: 28px;
            border-radius: 24px;
            background: #ffffff;
            color: #2a1d16;
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
        }

        .about-panel h2 {
            margin: 0 0 10px;
            font-size: 2rem;
            color: #8f2b16;
        }

        .lead {
            margin: 0 0 14px;
            font-size: 1.08rem;
            line-height: 1.8;
            color: #4a372e;
        }

        .teacher-highlight {
            margin: 0 0 18px;
            padding: 14px 16px;
            border-left: 6px solid #f2b80e;
            border-radius: 14px;
            background: #fff5d8;
            color: #5a3c0b;
            font-weight: 700;
            line-height: 1.7;
        }

        .subscribe-panel {
            display: grid;
            grid-template-columns: 160px 1fr;
            gap: 18px;
            align-items: center;
            margin: 0 0 18px;
            padding: 18px;
            border-radius: 18px;
            background: linear-gradient(180deg, #fff8eb 0%, #fff2cf 100%);
            border: 1px solid #f2d48b;
        }

        .subscribe-qr {
            width: 100%;
            max-width: 160px;
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
        }

        .subscribe-copy h3 {
            margin: 0 0 8px;
            font-size: 1.4rem;
            color: #8f2b16;
        }

        .subscribe-copy p {
            margin: 0;
            color: #5a4437;
            line-height: 1.7;
        }

        .credit-title {
            margin: 18px 0 12px;
            font-size: 1.15rem;
            color: #8f2b16;
            font-weight: 800;
        }

        .credit-list {
            margin: 0;
            padding-left: 22px;
            columns: 2;
            column-gap: 32px;
            line-height: 1.8;
            color: #3d3028;
        }

        .credit-list li {
            break-inside: avoid;
            margin-bottom: 2px;
        }

        @media (max-width: 820px) {
            body {
                padding: 14px;
            }

            .shell {
                padding: 18px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .card {
                min-height: 0;
            }

            .portrait {
                height: 220px;
            }

            #launch-btn {
                width: 100%;
                min-width: 0;
            }

            .about-panel {
                padding: 20px;
            }

            .subscribe-panel {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .credit-list {
                columns: 1;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="hero">
            <h1>&#32025;&#29255;&#29557;&#39764;&#65281;</h1>
            <p>&#20808;&#36984;&#20320;&#30340;&#29557;&#39764;&#32773;&#65292;&#20877;&#36914;&#20837;&#36889;&#27454;&#28858;&#35506;&#31243;&#38283;&#30332;&#32780;&#35477;&#29983;&#30340;&#29557;&#39764;&#36938;&#25138;&#12290;</p>
        </section>

        <section class="grid">
            <article class="card" id="card-nun" data-character="nun">
                <div class="portrait">
                    <img src="assets/nun/nun_idle.png?v=20260630-character-map-fix-2" alt="&#20462;&#22899;">
                </div>
                <h2 class="name">&#32854;&#32147;&#20462;&#22899;</h2>
                <div class="tag">&#37325;&#26023;&#29190;&#30332;&#22411;&#65288;&#26023;&#65289;</div>
                <p class="desc">&#21934;&#30332;&#20663;&#23475;&#39640;&#65292;&#36969;&#21512;&#31337;&#31337;&#28165;&#24618;&#33287;&#22739; Boss &#34880;&#32218;&#12290;&#22823;&#32085;&#26159;&#22823;&#36852;&#26059;&#26023;&#65292;&#36817;&#36523;&#21312;&#22495;&#22739;&#21046;&#29305;&#21029;&#24375;&#12290;</p>
            </article>

            <article class="card selected" id="card-priest" data-character="priest">
                <div class="portrait">
                    <img src="assets/priest/priest_idle.png?v=20260630-character-map-fix-2" alt="&#31070;&#29238;">
                </div>
                <h2 class="name">&#39493;&#39764;&#31070;&#29238;</h2>
                <div class="tag">&#39640;&#36895;&#23556;&#25802;&#22411;</div>
                <p class="desc">&#23556;&#36895;&#24555;&#12289;&#25163;&#24863;&#20432;&#33853;&#65292;&#36969;&#21512;&#21916;&#27489;&#38728;&#27963;&#36208;&#20301;&#33287;&#36899;&#32396;&#22739;&#21046;&#30340;&#29609;&#27861;&#12290;&#22823;&#32085;&#26159;&#20840;&#26041;&#20301;&#23556;&#25802;&#12290;</p>
            </article>
        </section>

        <section class="actions">
            <button id="launch-btn" type="button">&#38283;&#22987;&#29557;&#39764;</button>
        </section>

        <section class="about-panel" aria-labelledby="about-title">
            <h2 id="about-title"></h2>
            <p class="lead" id="about-lead"></p>
            <p class="teacher-highlight" id="teacher-highlight"></p>
            <div class="subscribe-panel">
                <img class="subscribe-qr" src="assets/thanks/subscribe_qr.png?v=20260630-character-map-fix-2" alt="訂閱 QR Code">
                <div class="subscribe-copy">
                    <h3 id="subscribe-title"></h3>
                    <p id="subscribe-copy"></p>
                </div>
            </div>

            <div class="credit-title" id="credit-title"></div>
            <ol class="credit-list" id="credit-list">
                <li>Bobo Chen</li>
                <li>Chen Allen</li>
                <li>Chungwei Hsieh</li>
                <li>Ian Chen</li>
                <li>Jan-yin Kuo</li>
                <li>Lili Lin</li>
                <li>Louis Ho</li>
                <li>Ryan Peng</li>
                <li>Tsai Kurt</li>
            </ol>
        </section>
    </main>

    <script>
        let selectedCharacter = 'priest';

        const nunCard = document.getElementById('card-nun');
        const priestCard = document.getElementById('card-priest');
        const launchBtn = document.getElementById('launch-btn');
        const aboutTitle = document.getElementById('about-title');
        const aboutLead = document.getElementById('about-lead');
        const teacherHighlight = document.getElementById('teacher-highlight');
        const subscribeTitle = document.getElementById('subscribe-title');
        const subscribeCopy = document.getElementById('subscribe-copy');
        const creditTitle = document.getElementById('credit-title');

        function setCharacter(character) {
            selectedCharacter = character;
            nunCard.classList.toggle('selected', character === 'nun');
            priestCard.classList.toggle('selected', character === 'priest');
        }

        nunCard.addEventListener('click', () => setCharacter('nun'));
        priestCard.addEventListener('click', () => setCharacter('priest'));

        launchBtn.addEventListener('click', () => {
            window.location.href = `play.html?character=${selectedCharacter}`;
        });

        aboutTitle.textContent = '\u611f\u8b1d\u5927\u5bb6\u652f\u6301\u8c93\u8001\u5e2b\u958b\u767c\u8ab2\u7a0b\u904a\u6232';
        aboutLead.textContent = '\u9019\u500b\u9996\u9801\u8aaa\u660e\u5340\uff0c\u7279\u5225\u737b\u7d66\u4e00\u8def\u652f\u6301\u8c93\u8001\u5e2b\u958b\u767c\u8ab2\u7a0b\u904a\u6232\u7684\u6bcf\u4e00\u4f4d\u5925\u4f34\u3002\u56e0\u70ba\u6709\u5927\u5bb6\u4e00\u8d77\u6295\u5165\u3001\u4e00\u8d77\u6e2c\u8a66\u3001\u4e00\u8d77\u63d0\u51fa\u60f3\u6cd5\uff0c\u9019\u6b3e\u4f5c\u54c1\u624d\u80fd\u4e00\u6b65\u4e00\u6b65\u9577\u6210\u73fe\u5728\u7684\u6a21\u6a23\u3002';
        teacherHighlight.innerHTML = '\u7279\u5225\u611f\u8b1d <strong>\u5c0f\u54aa\u8001\u5e2b</strong> \u8207\u6240\u6709\u652f\u6301\u8005\u7684\u966a\u4f34\u8207\u9f13\u52f5\uff0c\u8b93\u9019\u9580\u8ab2\u7a0b\u4e2d\u7684\u904a\u6232\u958b\u767c\u4e0d\u53ea\u662f\u4f5c\u54c1\u88fd\u4f5c\uff0c\u66f4\u6210\u70ba\u5927\u5bb6\u5171\u540c\u5b8c\u6210\u7684\u5275\u4f5c\u6b77\u7a0b\u3002';
        subscribeTitle.textContent = '\u6b61\u8fce\u8a02\u95b1\uff0c\u514d\u8cbb\u91cb\u51fa';
        subscribeCopy.textContent = '\u6383\u63cf QR Code \u5c31\u80fd\u76f4\u63a5\u95dc\u6ce8\uff0c\u4e00\u8d77\u652f\u6301\u8ab2\u7a0b\u904a\u6232\u8207\u5f8c\u7e8c\u5167\u5bb9\u66f4\u65b0\u3002';
        creditTitle.textContent = '28 \u4f4d\u5171\u540c\u958b\u767c\u8005\u611f\u8b1d\u540d\u55ae';

        const additionalCredits = [
            '\u4f55\u9298\u9d3b',
            '\u5085\u6b3d\u6770',
            '\u5289\u6587\u5c1a',
            '\u5b54\u7965\u5b87',
            '\u674e\u4ec1\u8000',
            '\u674e\u82f1\u5982',
            '\u6797\u4ee5\u6cd3',
            '\u6797\u6176\u6cd3',
            '\u6881\u5927\u9d6c',
            '\u6f58\u6167\u541b',
            '\u8521\u660c\u6a3a',
            '\u8a31\u58eb\u5f65',
            '\u9112\u6566\u601c',
            '\u9673\u5b5d\u9b41',
            '\u9673\u5c0f\u8449',
            '\u9673\u6176\u6e90',
            '\u9673\u6c11\u5cf0',
            '\u9673\u9023\u57df',
            '\u9ec3\u5b89\u5fd7'
        ];

        const creditList = document.getElementById('credit-list');
        additionalCredits.forEach((name) => {
            const item = document.createElement('li');
            item.textContent = name;
            creditList.appendChild(item);
        });
    </script>
</body>
</html>
